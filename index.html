<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Code Analyzer | Baher</title>
<style>
  :root {
    --bg: #121212;
    --panel: #1a1a1a;
    --panel-2: #202020;
    --border: #333333;
    --border-light: #3d3d3d;
    --text: #e8e8e8;
    --muted: #9a9a9a;
    --accent: #d0d0d0;
    --danger: #b0413e;
    --success: #2e7d32;
    --font: 'Georgia', 'Times New Roman', serif;
    --font-ui: 'Segoe UI', Tahoma, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 24px;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    position: relative;
  }

  header {
    text-align: center;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  header h1 {
    font-family: var(--font);
    font-size: 30px;
    font-weight: 400;
    letter-spacing: 1px;
    margin: 0 0 8px;
    color: #f2f2f2;
  }
  header h5 {
    font-family: var(--font);
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 1px;
    margin: 0 0 8px;
    color: #f2f2f2;
  }

  header p {
    color: var(--muted);
    margin: 0;
    font-size: 13px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* تحسين مؤشر حالة الاتصال ليصبح زراً علوياً بألوان واضحة */
  .status-badge {
    position: absolute;
    top: 0;
    right: 0;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--panel);
    border: 1px solid var(--border-light);
    padding: 6px 14px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-radius: 20px;
    color: var(--muted);
    transition: all 0.3s ease;
  }
  
  .status-badge::before {
    content: '';
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #666;
    box-shadow: 0 0 8px #666;
    transition: all 0.3s ease;
  }

  .status-badge.connecting {
    color: #cca104;
    border-color: #cca104;
  }
  .status-badge.connecting::before {
    background: #cca104;
    box-shadow: 0 0 8px #cca104;
  }

  .status-badge.ok { 
    color: #4caf50; 
    border-color: var(--success);
    background: rgba(46, 125, 50, 0.05);
  }
  .status-badge.ok::before {
    background: #4caf50;
    box-shadow: 0 0 10px #4caf50;
  }

  .status-badge.err { 
    color: #f44336; 
    border-color: var(--danger);
    background: rgba(176, 65, 62, 0.05);
  }
  .status-badge.err::before {
    background: #f44336;
    box-shadow: 0 0 10px #f44336;
  }

  .social {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-bottom: 22px;
    flex-wrap: wrap;
    align-items: center;
  }

  .social a {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--panel);
    border: 1px solid var(--border-light);
    color: var(--text);
    padding: 10px 20px;
    font-size: 13px;
    letter-spacing: 0.5px;
    text-decoration: none;
    text-transform: uppercase;
    transition: 0.15s ease;
  }

  .social a:hover {
    background: #2a2a2a;
    border-color: #666;
  }

  .social a svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 20px;
  }

  @media (max-width: 860px) {
    .grid { grid-template-columns: 1fr; }
    .status-badge { position: static; margin: 0 auto 15px auto; display: table; }
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 18px;
    display: flex;
    flex-direction: column;
  }

  .card h2 {
    font-size: 12px;
    margin: 0 0 12px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  textarea, pre.output {
    width: 100%;
    background: #0f0f0f;
    color: var(--text);
    border: 1px solid var(--border);
    padding: 14px;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 13.5px;
    resize: vertical;
  }

  textarea {
    min-height: 380px;
    line-height: 1.55;
  }

  pre.output {
    min-height: 380px;
    white-space: pre-wrap;
    word-break: break-word;
    margin: 0;
    overflow-y: auto;
    max-height: 560px;
  }

  .actions {
    display: flex;
    gap: 10px;
    margin: 18px 0;
    flex-wrap: wrap;
  }

  button {
    flex: 1;
    min-width: 130px;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border-light);
    padding: 12px 14px;
    font-size: 13px;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: 0.15s ease;
    font-weight: 500;
    text-transform: uppercase;
  }

  button:hover {
    background: #2a2a2a;
    border-color: #555;
  }

  button.primary {
    background: #2c2c2c;
    color: #f5f5f5;
    border: 1px solid #4a4a4a;
  }

  button.primary:hover {
    background: #383838;
  }

  button.stop {
    background: transparent;
    border-color: var(--danger);
    color: var(--danger);
    flex: 0 0 auto;
    min-width: 100px;
  }

  button.stop:hover {
    background: rgba(176, 65, 62, 0.1);
  }

  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .footer-note {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    margin-top: 24px;
    line-height: 1.9;
    border-top: 1px solid var(--border);
    padding-top: 18px;
  }

  .footer-note code {
    background: var(--panel-2);
    padding: 2px 7px;
    border: 1px solid var(--border);
    display: inline-block;
    font-family: 'Consolas', monospace;
  }

  /* الفوتر الجديد المخصص لمعسكر تسارع وربط اللينكد إن */
  .bootcamp-footer {
    text-align: center;
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  .bootcamp-title {
    font-family: var(--font);
    font-size: 15px;
    color: #f2f2f2;
    margin: 0 0 6px 0;
    letter-spacing: 0.5px;
  }

  .bootcamp-sub {
    font-size: 12px;
    color: var(--muted);
    margin: 0 0 16px 0;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .linkedin-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #1b1b1b;
    border: 1px solid #0077b5;
    color: #0077b5;
    padding: 8px 18px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-decoration: none;
    font-weight: 600;
    transition: all 0.2s ease;
  }

  .linkedin-btn:hover {
    background: #0077b5;
    color: #fff;
    box-shadow: 0 0 12px rgba(0, 119, 181, 0.3);
  }

  .linkedin-btn svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Baher | Python Code Analyzer</h1>
    <h5>Development by Eng. Sami Alshammari</h5>
    <!-- زر حالة الاتصال في الأعلى يمين الهيدر -->
    <div class="status-badge" id="connStatus">Ready</div>
  </header>

  <div class="social">
    <a href="https://github.com/Sami-Alshammari" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/></svg>
      GitHub
    </a>
    <a href="https://www.linkedin.com/in/sami-n-alshammari-353372294/" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.368-1.85 3.598 0 4.268 2.37 4.268 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      LinkedIn
    </a>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Source Code (Python)</h2>
      <textarea id="codeInput" placeholder="Paste your Python code here...">def calc(lst):
    total = 0
    for i in range(len(lst)):
        total = total + lst[i]
    avg = total / len(lst)
    return avg</textarea>
    </div>

    <div class="card">
      <h2>Result</h2>
      <pre class="output" id="output">Output will appear here...</pre>
    </div>
  </div>

  <div class="actions">
    <button class="primary" onclick="runAnalysis('explain')">Explain Code</button>
    <button class="primary" onclick="runAnalysis('optimize')">Optimize Code</button>
    <button class="primary" onclick="runAnalysis('review')">General Review</button>
    <button class="primary" onclick="runAnalysis('bugs')">Find Bugs</button>
    <button class="stop" id="stopBtn" onclick="stopGeneration()" disabled>Stop</button>
  </div>

  <!-- الفوتر المعدل بالكامل في أسفل الصفحة -->
  <footer class="bootcamp-footer">
    <div class="bootcamp-title">Tasar’u Bootcamp — GPU Engineering for Language Models & Agentic Systems</div>
    <div class="bootcamp-sub">This project was developed as part of the bootcamp</div>
    <a href="https://www.linkedin.com/groups/32380021/" target="_blank" rel="noopener noreferrer" class="linkedin-btn">
      <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.368-1.85 3.598 0 4.268 2.37 4.268 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      Join Bootcamp LinkedIn Group
    </a>
  </footer>
</div>

<script>
let controller = null;

// البرومبتات المخصصة لكل نمط تحليل
const prompts = {
  explain: (code) => `### Instruction:\nYou are an expert Python software architect. Analyze the provided Python code and explain it using the exact structure below. If the input is not valid or executable Python code, write a single concise paragraph stating that it is a plain string/text, then stop.\n\nStructure your response as follows:\n#### 📝 Code Summary\n[Provide a 1-2 sentence high-level overview of what the code does]\n\n#### 🚀 Execution Flow\n[Provide a concise bulleted list of how the code executes from top to bottom]\n\n### Input:\n\`\`\`python\n${code}\n\`\`\`\n\n### Response:\n`,
  optimize: (code) => `### Instruction:\nYou are a high-performance Python engineer. Review the provided Python code for efficiency. If the code is already optimal or is just a basic literal, state that directly in 2 sentences and stop.\n\nStructure your response as follows:\n#### ⚡ Optimized Code\n\`\`\`python\n[Your optimized code here]\n\`\`\`\n\n#### 📊 Performance Improvements\n- **Changes Made:** [1 short sentence]\n- **Time Complexity:** [e.g., O(1) or O(n)]\n\n### Input:\n\`\`\`python\n${code}\n\`\`\`\n\n### Response:\n`,
  review: (code) => `### Instruction:\nYou are a senior code auditor. Perform a clean code review of the provided Python code. If the code is too basic to review, state that directly in 2 sentences and stop.\n\nStructure your response as follows:\n#### 🔍 Code Review Findings\n- **Style & PEP 8:** [Your finding in 1 sentence]\n- **Maintainability:** [Your finding in 1 sentence]\n- **Refactoring Advice:** [Your finding in 1 sentence]\n\n### Input:\n\`\`\`python\n${code}\n\`\`\`\n\n### Response:\n`,
  bugs: (code) => `### Instruction:\nYou are a debugging specialist. Inspect the provided Python code for logical or runtime errors. If the code is completely safe and bug-free, state "Status: Clean. No bugs or syntax errors found." and stop.\n\nStructure your response as follows:\n#### 🐛 Bug Analysis\n- **Issue:** [Identify the bug or state if it is safe]\n- **Fix:** [Provide the corrected code snippet or explanation]\n\n### Input:\n\`\`\`python\n${code}\n\`\`\`\n\n### Response:\n`
};

// تحديث شارة حالة الاتصال
function setStatus(text, cls) {
  const el = document.getElementById('connStatus');
  if (el) {
    el.textContent = text;
    el.className = 'status-badge ' + (cls || '');
  }
}

// الدالة الرئيسية لإرسال الكود للتحليل
async function runAnalysis(mode) {
  const code = document.getElementById('codeInput').value.trim();
  const output = document.getElementById('output');
  const stopBtn = document.getElementById('stopBtn');

  if (!code) {
    output.textContent = 'Please paste some code first.';
    return;
  }

  // تعطيل الأزرار أثناء المعالجة وتفعيل زر الإيقاف
  document.querySelectorAll('button.primary').forEach(b => b.disabled = true);
  if (stopBtn) stopBtn.disabled = false;
  
  output.textContent = 'Analyzing code, please wait...';
  setStatus('Analyzing...', 'connecting');

  controller = new AbortController();
  const prompt = prompts[mode](code);

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: prompt }),
      signal: controller.signal
    });

    if (!res.ok) {
      const errText = await res.text();
      throw new Error(`HTTP ${res.status}: ${errText}`);
    }

    const data = await res.json();
    output.textContent = data.response;
    setStatus('Done', 'ok');

  } catch (err) {
    if (err.name === 'AbortError') {
      output.textContent += '\n\n[Generation stopped by user]';
      setStatus('Stopped', '');
    } else {
      output.textContent = 'Connection error:\n' + err.message;
      setStatus('Failed', 'err');
    }
  } finally {
    // إعادة تفعيل الأزرار بعد الانتهاء
    document.querySelectorAll('button.primary').forEach(b => b.disabled = false);
    if (stopBtn) stopBtn.disabled = true;
    controller = null;
  }
}

// دالة إيقاف التوليد
function stopGeneration() {
  if (controller) controller.abort();
}
</script>
</body>
</html>
